version: "3.9"

# ─── EATIS Full Stack ─────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build          # start everything (uses .env for DB)
#   docker compose up -d               # detached
#   docker compose down -v             # teardown + remove volumes
#
# To use local DB:     comment out DATABASE_URL in .env
# To use Supabase:     set DATABASE_URL=postgresql://...supabase...?sslmode=require in .env

services:

  # ── PostgreSQL (local fallback — only used when DATABASE_URL is not set) ──────
  db:
    image: postgres:16-alpine
    container_name: eatis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: eatis_db
      POSTGRES_USER: eatis_user
      POSTGRES_PASSWORD: eatis_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eatis_user -d eatis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: eatis_api
    restart: unless-stopped
    dns:
      - 8.8.8.8    # Google DNS — fixes hostname resolution for external DBs
      - 8.8.4.4
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://eatis_user:eatis_password@db:5432/eatis_db}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production-xyz}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: gemini-2.5-flash
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      MODEL_DIR: /app/models
      MODEL_RETRAIN_ON_STARTUP: ${MODEL_RETRAIN_ON_STARTUP:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@eatis.gov}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_NAME: ${ADMIN_NAME:-System Administrator}
    ports:
      - "8001:8000"
    volumes:
      - model_data:/app/models          # persist trained models
      - ./app:/app/app:ro               # live-reload in dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── pgAdmin (optional — comment out in production) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eatis_pgadmin
    restart: unless-stopped
    profiles: ["dev"]          # only starts with: docker compose --profile dev up
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eatis.gov
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  model_data:
    driver: local
  pgadmin_data:
    driver: local
